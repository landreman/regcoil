name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: build (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gfortran \
            libblas-dev \
            pkg-config

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc pkg-config

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python package (builds Fortran extension via pip)
        run: |
          python -m pip install -U pip
          pip install -v ".[dev]"
          python -c "import regcoil._core; print('regcoil._core OK')"

      - name: Run pytest tests
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Slow tests are REALLY slow on the Linux runners so only run them on macOS.
            pytest -m "not slow"
          else
            pytest
          fi

  docs:
    name: docs (build + doctest + nbmake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gfortran \
            libblas-dev \
            pkg-config

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python package + docs extra
        run: |
          python -m pip install -U pip
          pip install -v ".[docs]"
          python -c "import regcoil._core; print('regcoil._core OK')"

      - name: Sphinx build (warnings are errors)
        run: sphinx-build -W -b html docs docs/_build/html

      - name: Doctest
        run: sphinx-build -b doctest docs docs/_build/doctest

      - name: nbmake safety net over the executed doc pages
        run: |
          mkdir -p /tmp/doc_notebooks
          for f in docs/quickstart.md docs/usage.md docs/plotting.md; do
            jupytext --to ipynb --output "/tmp/doc_notebooks/$(basename "${f%.md}").ipynb" "$f"
          done
          pytest --nbmake /tmp/doc_notebooks --nbmake-timeout=600
