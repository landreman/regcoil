name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: build (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gfortran \
            libblas-dev \
            liblapack-dev \
            libnetcdf-dev \
            libnetcdff-dev \
            pkg-config

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc netcdf netcdf-fortran pkg-config

      - name: Build legacy Fortran executable
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            make -j4 MACHINE=github_ubuntu
          else
            make -j4 MACHINE=github_macos
          fi
          test -x ./regcoil

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python package (builds Fortran extension via pip)
        run: |
          python -m pip install -U pip
          pip install -v ".[dev]"
          python -c "import regcoil._core; print('regcoil._core OK')"

      - name: Run pytest tests
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Slow tests are REALLY slow on the Linux runners so only run them on macOS.
            pytest -m "not slow"
          else
            pytest
          fi
