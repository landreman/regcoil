# .readthedocs.yaml
# Read the Docs configuration file, see:
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# RTD compiles the Fortran extension (gfortran + BLAS) so that
# executed doc pages (MyST-NB) run the real regcoil code path, not a mock.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - gfortran
    - libblas-dev
    - pkg-config
  jobs:
    pre_build:
      # Fail fast (and legibly) if the compiled extension didn't build,
      # rather than during the first executed notebook page.
      # No single quotes here: RTD wraps job commands in an outer layer of
      # single quotes, so a nested `'...'` (e.g. inside print()) breaks the
      # shell parsing ("Unterminated quoted string"). Keep this to plain
      # double quotes only; a failed import already prints a legible traceback.
      - python -c "import regcoil._core; print(42)"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
